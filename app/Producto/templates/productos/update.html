{% extends "base.html" %}

{% block title %}Registrar producto - Techbol{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        
        <div class="card shadow-sm" style="border-radius: 12px; border: none; background-color: #ffffff;">
            <div class="card-body p-4">
                
                <h3 class="card-title text-center mb-4" style="color: #4a6fa5; font-weight: 700;">
                    Editar Producto: {{producto.nombre}}
                </h3>
                
                <form action="{{url_for('bp_productos.update',id=producto.id)}}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 500; color: #555555;">
                            Nombre del producto
                        </label>
                        <input class="form-control" name="nombre" value="{{producto.nombre}}" style="border-radius: 8px;">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" style="font-weight: 500; color: #555555;">
                            Precio
                        </label>
                        <input type="number" step="0.01" class="form-control" name="precio" value="{{producto.precio}}" style="border-radius: 8px;">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" style="font-weight: 500; color: #555555;">
                            Stock
                        </label>
                        <input type="number" class="form-control" name="stock" value="{{producto.stock}}" style="border-radius: 8px;">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{url_for('bp_productos.index')}}" class="btn btn-outline-secondary" style="border-radius: 8px; width: 48%;">Cancelar</a>
                        <button type="submit" class="btn" style="background-color: #4a6fa5; color: white; border-radius: 8px; font-weight: 500; width: 48%;">
                            Guardar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
